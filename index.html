<?php
session_start();

/* LOGIN */
if(isset($_POST['login'])){
    $username = $_POST['username'];

    // create session
    $_SESSION['username'] = $username;

    // create cookie (1 hour)
    setcookie("username",$username,time()+3600);
}

/* LOGOUT */
if(isset($_POST['logout'])){
    session_destroy();
    header("Location: ".$_SERVER['PHP_SELF']);
    exit();
}
?>

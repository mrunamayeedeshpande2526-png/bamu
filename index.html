<!DOCTYPE html>
<html>
<head>
<title>AJAX Search Suggestion</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
#suggestions{
    border:1px solid #ccc;
    width:200px;
    display:none;
    background:white;
}

.suggestion-item{
    padding:5px;
    cursor:pointer;
}

.suggestion-item:hover{
    background:#f0f0f0;
}
</style>

</head>

<body>

<h2>Search Suggestion Example</h2>

<input type="text" id="search" placeholder="Type to search">

<div id="suggestions"></div>

<script src="script.js"></script>

</body>
</html>
